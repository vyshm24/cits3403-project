{% extends "base.html" %}

{% block title %}Search - Travel App{% endblock %}

{% block extra_css %}

{% endblock %}

{% block content %}

    <section class="relative flex items-start justify-center pt-24 pb-16 bg-gray-50">
        <div class="w-full max-w-2xl px-6">
          
          <h1 class="text-3xl md:text-4xl font-bold text-center mb-6">
            Find your next adventure
          </h1>

          <div class="relative">
            <input 
              type="text" 
              placeholder="Search countries, cities, itineraries..."
              class="w-full px-6 py-4 text-lg rounded-2xl border border-gray-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />

       
            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">
              🔍
            </div>
          </div>

        </div>
    </section>
    </div>
  </header>
  <section class="bg-gray-50 py-10">
    <h1 class="text-2xl font-bold text-center">
      Search Results
    </h1>
  </section>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/search.js') }}"></script>
{% endblock %}
