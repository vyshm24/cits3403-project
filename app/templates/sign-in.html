<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Travel Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sign-in-up.css') }}">
</head>

<body>
    <div class="page">
        <h1 class="site-title">Travel Blog</h1>
        <section class="login-card">
            <h2>Sign In</h2>
            <form method="POST" action="{{ url_for('main.signin') }}">
                <input type="text" placeholder="Enter your username" name="username" required>
                <input type="password" placeholder="Enter your password" name="password" required>
                <button type="submit" class="submit">LOGIN</button>
            </form>

            <p class="switch-to-sign-up">
                Don't have an account?<a href="{{ url_for('main.signup') }}">Sign up</a>
            </p>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/sign-in.js') }}"></script>
</body>

</html>
