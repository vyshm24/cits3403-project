<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Travel App{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>

  {% block extra_css %}{% endblock %}
</head>

<body class="bg-gray-50 text-gray-900">

  <!-- Navigation Bar -->
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center h-16" aria-label="Main navigation">

        <!-- Logo -->
        <span class="inline-flex items-center text-xl font-bold tracking-tight text-gray-900">
          Travel Blog
        </span>

        <!-- Nav Links -->
        <div class="hidden md:flex items-center space-x-8">
          <a href="/pages/countries.html" class="hover:text-indigo-600">Countries</a>
          <a href="/pages/Submit-form-page.html" class="hover:text-indigo-600">Post</a>
          <a href="/pages/search.html" class="hover:text-indigo-600">Search</a>
        </div>

        <!-- Auth / Profile -->
        <div class="flex items-center space-x-4 relative">

          <!-- Not logged in -->
          <div id="auth-links" class="flex items-center space-x-4">
            <a href="/pages/sign-in.html" class="text-gray-600 hover:text-black">Sign in</a>
            <a href="/pages/sign-up.html" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">
              Sign up
            </a>
          </div>

          <!-- Logged in -->
          <div id="profile-menu" class="hidden flex items-center space-x-4">
            <a href="/pages/Author-Profile-Page.html" id="profile-avatar-link">
              <img 
                src="https://i.pravatar.cc/40" 
                alt="User profile" 
                class="w-9 h-9 rounded-full cursor-pointer hover:opacity-80 transition"
              />
            </a>

            <button id="logout-btn" class="text-red-600 hover:text-red-700 text-sm">
              Sign out
            </button>
          </div>

        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  {% block extra_js %}{% endblock %}
</body>
</html>
