<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Travel Blog</title>
    <link rel="stylesheet" href="sign-up.css">
</head>
<body>
    <div class="page">
        <section class="signup-card">
            <h2>Sign Up</h2>
            <form action="">
                <input type="email" placeholder="Enter your email" name="email" required>
                <input type="text" placeholder="Choose a username" name="username" required>
                <input type="password" placeholder="Create a password" name="password" required>
                <input type="password" placeholder="Confirm your password" name="confirm-password" required>
                <button class="submit">SIGN UP</button>
            </form>

            <p class="switch-to-sign-in">
                Already have an account? <a href="sign-in.html">Sign in</a>
            </p>
        </section>
    </div>
</body>
</html>
