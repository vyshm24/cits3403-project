<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>View Itinerary</title>
  <link rel="stylesheet" href="../css/view-itinerary.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

  <!-- NAVBAR -->
  <header class="border-b bg-white fixed top-0 w-full z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center px-4 py-6">

      <!-- 左 -->
      <a href="home-page.html" class="font-semibold text-lg">
        Travel Blog
      </a>

      <!-- 中 -->
      <h1 class="text-xl font-bold">Itinerary Details</h1>

      <!-- 右（头像） -->
      <a href="../pages/profolio-page.html">
        <img id="user-avatar" src="https://i.pravatar.cc/40" class="w-10 h-10 rounded-full cursor-pointer border" />
      </a>

    </div>
  </header>

  <!-- HEADER -->
  <section class="max-w-4xl mx-auto px-4 pt-28 pb-6 space-y-3">
    <h1 id="title" class="text-3xl font-bold"></h1>
    <div class="text-sm text-gray-500">
      <span id="author"></span> • <span id="date"></span>
    </div>
    <div id="tags" class="flex flex-wrap gap-2"></div>
  </section>

  <!-- OVERVIEW -->
  <section class="max-w-4xl mx-auto px-4 py-4">
    <h2 class="text-xl font-semibold mb-2">General (Overview)</h2>
    <p id="overview" class="text-gray-700"></p>
  </section>

  <!-- MAIN -->
  <main class="max-w-6xl mx-auto flex gap-6 px-4 py-8">
    <div id="timeline" class="w-2/3 space-y-10"></div>
    <div class="w-1/3">
      <div id="map" class="h-[600px] sticky top-28 bg-gray-200 rounded"></div>
    </div>
  </main>

  <!-- CURRENT -->
  <div id="current-indicator" class="fixed bottom-6 left-6 bg-white px-4 py-2 shadow rounded">
  </div>

  <!-- INTERACTION -->
  <div class="max-w-4xl mx-auto px-4 py-10 space-y-4">

  <div class="flex gap-4">
    <button id="like-btn" class="px-4 py-2 bg-gray-200 rounded">
      👍 Like
    </button>

    <button id="fav-btn" class="px-4 py-2 bg-gray-200 rounded">
      ⭐ Favorite
    </button>
  </div>

  <!-- 评论输入 -->
  <div class="flex gap-2">
    <textarea id="comment-box"
      class="w-full border p-2 rounded"
      placeholder="Leave a comment..."></textarea>

    <button id="comment-btn"
      class="px-4 py-2 bg-blue-500 text-white rounded">
      Post
    </button>
  </div>

</div>

  <script src="../js/View-IT-Demo.js"></script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAFbTlfB_BZlezD2-l2HPvU5mvtKQopBUM&callback=initMap">
    </script>

</body>

</html>
